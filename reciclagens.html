<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reciclagens | SICRAI</title>

    <link rel="stylesheet" href="assets/css/dashboard.css">
    <link rel="stylesheet" href="assets/css/sidebar-toggle.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <script>
        if (localStorage.getItem("tema") === "dark") {
            document.body.classList.add("dark");
        }
    </script>

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="logo">

            <i class="fa-solid fa-recycle"></i>
            <span>SICRAI</span>

        </div>

        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Minimizar menu">
            <i class="fa-solid fa-angles-left"></i>
        </button>

        <nav>

            <a href="dashboard.html">
                <i class="fa-solid fa-chart-line"></i>
                <span class="link-text">Dashboard</span>
            </a>

            <a href="reciclagens.html" class="active">
                <i class="fa-solid fa-recycle"></i>
                <span class="link-text">Reciclagens</span>
            </a>

            <a href="recompensas-dashboard.html">
                <i class="fa-solid fa-gift"></i>
                <span class="link-text">Recompensas</span>
            </a>

            <a href="ranking.html">
                <i class="fa-solid fa-trophy"></i>
                <span class="link-text">Ranking</span>
            </a>

            <a href="configuracoes.html">
                <i class="fa-solid fa-gear"></i>
                <span class="link-text">Configurações</span>
            </a>

            <a href="#" id="logoutBtn">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span class="link-text">Sair</span>
            </a>

        </nav>

    </aside>

    <!-- CONTEÚDO -->

    <main class="main">

        <div class="topbar">

            <div>

                <h1>♻️ Histórico de Reciclagens</h1>

                <p>
                    Acompanhe todas as suas contribuições.
                </p>

            </div>

        </div>

        <!-- CARDS -->

        <section class="stats-grid">

            <div class="stat-card">
                <i class="fa-solid fa-recycle"></i>
                <h2 id="totalLatinhas">0</h2>
                <p>Latinhas Recicladas</p>
            </div>

            <div class="stat-card">
                <i class="fa-solid fa-star"></i>
                <h2 id="totalPontos">0</h2>
                <p>Pontos Gerados</p>
            </div>

        </section>

        <!-- META -->

        <section class="progress-card">

            <h2>Meta Mensal</h2>

            <p id="metaTexto">0 / 300 latinhas</p>

            <div class="progress-bar">

                <div class="progress-fill" id="metaFill" style="width:0%;">

                    0%

                </div>

            </div>

        </section>

        <!-- HISTÓRICO COMPLETO -->

        <section class="history-card">

            <h2>Histórico de Atividades</h2>

            <table>

                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Descrição</th>
                        <th>Pontos</th>
                    </tr>
                </thead>

                <tbody id="historicoBody">
                    <tr><td colspan="3">Carregando...</td></tr>
                </tbody>

            </table>

        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase.js"></script>

    <script>
        const META_MENSAL_LATINHAS = 300;

        async function carregarReciclagens() {
            const { data: { session } } = await client.auth.getSession();
            if (!session) {
                window.location.href = "login.html";
                return;
            }
            const userId = session.user.id;

            const { data: perfil } = await client
                .from("perfis")
                .select("pontos, latinhas")
                .eq("id", userId)
                .single();

            const totalLatinhas = perfil?.latinhas ?? 0;
            const totalPontos = perfil?.pontos ?? 0;

            document.getElementById("totalLatinhas").textContent = totalLatinhas;
            document.getElementById("totalPontos").textContent = totalPontos;

            // Meta mensal baseada no total de latinhas do perfil
            const percentual = Math.min(Math.round((totalLatinhas / META_MENSAL_LATINHAS) * 100), 100);
            document.getElementById("metaTexto").textContent = `${totalLatinhas} / ${META_MENSAL_LATINHAS} latinhas`;
            const fill = document.getElementById("metaFill");
            fill.style.width = percentual + "%";
            fill.textContent = percentual + "%";

            await carregarHistoricoCompleto(userId);
        }

        /* ── HISTÓRICO REAL: reciclagens (verde, +pontos) + resgates (vermelho, -pontos) ── */

        async function carregarHistoricoCompleto(userId) {

            const corpo = document.getElementById("historicoBody");

            const { data: reciclagensData, error: erroReciclagens } = await client
                .from("reciclagens")
                .select("latinhas, pontos, created_at")
                .eq("user_id", userId)
                .order("created_at", { ascending: false });

            const { data: resgatesData, error: erroResgates } = await client
                .from("resgates")
                .select("nome, pontos, created_at")
                .eq("user_id", userId)
                .order("created_at", { ascending: false });

            if (erroReciclagens && erroResgates) {
                corpo.innerHTML = `<tr><td colspan="3">Não foi possível carregar seu histórico.</td></tr>`;
                return;
            }

            const eventos = [];

            (reciclagensData || []).forEach(item => {
                eventos.push({
                    descricao: `Reciclou ${item.latinhas} latinha${item.latinhas > 1 ? "s" : ""}`,
                    pontos: item.pontos,
                    data: item.created_at
                });
            });

            (resgatesData || []).forEach(item => {
                eventos.push({
                    descricao: `Resgatou "${item.nome}"`,
                    pontos: -item.pontos,
                    data: item.created_at
                });
            });

            if (eventos.length === 0) {
                corpo.innerHTML = `<tr><td colspan="3">Você ainda não tem nenhum histórico.</td></tr>`;
                return;
            }

            eventos.sort((a, b) => new Date(b.data) - new Date(a.data));

            corpo.innerHTML = eventos.slice(0, 30).map(ev => {

                const dataFormatada = new Date(ev.data).toLocaleDateString("pt-BR", {
                    day: "2-digit",
                    month: "2-digit",
                    year: "numeric"
                });

                const positivo = ev.pontos >= 0;
                const cor = positivo ? "#249341" : "#e53935";
                const sinal = positivo ? "+" : "";

                return `
                    <tr>
                        <td>${dataFormatada}</td>
                        <td>${ev.descricao}</td>
                        <td style="color:${cor}; font-weight:700;">${sinal}${ev.pontos}</td>
                    </tr>
                `;
            }).join("");
        }

        carregarReciclagens();

        document.getElementById("logoutBtn")?.addEventListener("click", async () => {
            await client.auth.signOut();
            window.location.href = "login.html";
        });
    </script>
    <script src="assets/js/sidebar-toggle.js"></script>
</body>

</html>
