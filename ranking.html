<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ranking | SICRAI</title>

<link rel="stylesheet" href="assets/css/dashboard.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<aside class="sidebar">

    <div class="logo">
        <i class="fa-solid fa-recycle"></i>
        <span>SICRAI</span>
    </div>

    <nav>

        <a href="dashboard.html">
            <i class="fa-solid fa-chart-line"></i>
            Dashboard
        </a>

        <a href="ranking.html" class="active">
            <i class="fa-solid fa-trophy"></i>
            Ranking
        </a>

        <a href="recompensas-dashboard.html">
            <i class="fa-solid fa-gift"></i>
            Recompensas
        </a>

        <a href="configuracoes.html">
            <i class="fa-solid fa-gear"></i>
            Configurações
        </a>

    </nav>

</aside>

<main class="main">

    <div class="topbar">

        <div>

            <h1>🏆 Ranking Geral</h1>

            <p>
                Usuários com maior impacto ambiental.
            </p>

        </div>

    </div>

    <!-- PODIUM -->

    <section class="podium">

        <div class="podium-card second">

            <div class="medal silver">
                🥈
            </div>

            <h3>Maria</h3>

            <p>4.100 pontos</p>

        </div>

        <div class="podium-card first">

            <div class="medal gold">
                🥇
            </div>

            <h3>João</h3>

            <p>4.500 pontos</p>

        </div>

        <div class="podium-card third">

            <div class="medal bronze">
                🥉
            </div>

            <h3>Carlos</h3>

            <p>3.900 pontos</p>

        </div>

    </section>

    <!-- TABELA -->

    <section class="ranking-table-container">

        <div class="ranking-header">

            <span>Posição</span>
            <span>Usuário</span>
            <span>Pontos</span>

        </div>

        <div class="ranking-row">

            <span>#1</span>
            <span>João</span>
            <strong>4500</strong>

        </div>

        <div class="ranking-row">

            <span>#2</span>
            <span>Maria</span>
            <strong>4100</strong>

        </div>

        <div class="ranking-row">

            <span>#3</span>
            <span>Carlos</span>
            <strong>3900</strong>

        </div>

        <div class="ranking-row">

            <span>#4</span>
            <span>Ana</span>
            <strong>3500</strong>

        </div>

        <div class="ranking-row current-user">

            <span>#12</span>
            <span>Você</span>
            <strong>2450</strong>

        </div>

    </section>

</main>

</body>
</html>
