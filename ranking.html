<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking | SICRAI</title>
    <link rel="stylesheet" href="assets/css/dashboard.css">
    <link rel="stylesheet" href="assets/css/sidebar-toggle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>

        /* ── PÓDIO ── */
        .podium {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            margin-bottom: 35px;
            flex-wrap: wrap;
        }
        .podium-card {
            background: white;
            padding: 25px 20px;
            border-radius: 20px;
            text-align: center;
            min-width: 160px;
            box-shadow: 0 10px 30px rgba(0,0,0,.08);
            transition: transform .3s;
        }
        .podium-card:hover { transform: translateY(-5px); }
        .podium-card.first { transform: scale(1.06); }
        .podium-card.first:hover { transform: scale(1.06) translateY(-5px); }
        .medal { font-size: 2.8rem; margin-bottom: 8px; }
        .podium-card h3 { font-size: 1rem; margin-bottom: 4px; }
        .podium-card p  { color: #249341; font-weight: 700; font-size: .9rem; }

        /* ── TABELA ── */
        .ranking-table-container {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,.08);
        }
        .ranking-header {
            background: linear-gradient(135deg, #249341, #48a840);
            color: white;
            font-weight: 700;
            font-size: .95rem;
        }
        .ranking-header,
        .ranking-row {
            display: grid;
            grid-template-columns: 80px 1fr 1fr 1fr;
            padding: 16px 24px;
            align-items: center;
        }
        .ranking-row {
            border-bottom: 1px solid #f0f0f0;
            transition: background .2s;
            font-size: .93rem;
        }
        .ranking-row:last-child { border-bottom: none; }
        .ranking-row:hover { background: #f8fdf9; }
        .ranking-row.current-user {
            background: #e8f7ec;
            font-weight: 700;
        }
        .ranking-row .posicao {
            font-weight: 700;
            color: #249341;
            font-size: 1rem;
        }
        .ranking-row .latinhas-col { color: #249341; font-weight: 600; }
        .ranking-row .pontos-col   { color: #555; }

        /* ── DARK MODE ── */
        body.dark .podium-card {
            background: #1e1e1e;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,.3);
        }
        body.dark .podium-card p { color: #48a840; }

        body.dark .ranking-table-container {
            background: #1e1e1e;
            box-shadow: 0 10px 30px rgba(0,0,0,.3);
        }
        body.dark .ranking-row {
            border-bottom-color: #2a2a2a;
            color: white;
        }
        body.dark .ranking-row:hover { background: #2a2a2a; }
        body.dark .ranking-row.current-user { background: #1a3a22; }
        body.dark .ranking-row .posicao     { color: #48a840; }
        body.dark .ranking-row .latinhas-col { color: #48a840; }
        body.dark .ranking-row .pontos-col   { color: #aaa; }

        /* ── RESPONSIVO ── */
        @media (max-width: 600px) {
            .ranking-header,
            .ranking-row {
                grid-template-columns: 50px 1fr 80px 80px;
                padding: 14px 16px;
                font-size: .85rem;
            }
        }

    </style>

</head>

<body>

    <script>
        if (localStorage.getItem("tema") === "dark") {
            document.body.classList.add("dark");
        }
    </script>

    <aside class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-recycle"></i>
            <span>SICRAI</span>
        </div>
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Minimizar menu">
            <i class="fa-solid fa-angles-left"></i>
        </button>
        <nav>
            <a href="dashboard.html"><i class="fa-solid fa-chart-line"></i><span class="link-text">Dashboard</span></a>
            <a href="reciclagens.html"><i class="fa-solid fa-recycle"></i><span class="link-text">Reciclagens</span></a>
            <a href="recompensas-dashboard.html"><i class="fa-solid fa-gift"></i><span class="link-text">Recompensas</span></a>
            <a href="ranking.html" class="active"><i class="fa-solid fa-trophy"></i><span class="link-text">Ranking</span></a>
            <a href="configuracoes.html"><i class="fa-solid fa-gear"></i><span class="link-text">Configurações</span></a>
            <a href="#" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i><span class="link-text">Sair</span></a>
        </nav>
    </aside>

    <main class="main">

        <div class="topbar">
            <div>
                <h1>🏆 Ranking Geral</h1>
                <p>Usuários com mais latinhas recicladas.</p>
            </div>
        </div>

        <!-- PÓDIO -->
        <section class="podium" id="podio"></section>

        <!-- TABELA -->
        <section class="ranking-table-container" id="tabelaRanking">
            <div class="ranking-header">
                <span>Posição</span>
                <span>Usuário</span>
                <span>Latinhas ♻️</span>
                <span>Pontos ⭐</span>
            </div>
            <!-- linhas inseridas via JS -->
        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase.js"></script>

    <script>

        async function carregarRanking() {
            const { data: { session } } = await client.auth.getSession();
            if (!session) { window.location.href = "login.html"; return; }
            const userId = session.user.id;

            // Ordena por latinhas
            const { data: top, error } = await client
                .from("perfis")
                .select("id, nome, latinhas, pontos")
                .order("latinhas", { ascending: false })
                .limit(10);

            if (error || !top) { console.error(error); return; }

            // Posição do usuário atual
            const { data: meuPerfil } = await client
                .from("perfis")
                .select("nome, latinhas, pontos")
                .eq("id", userId)
                .single();

            let minhaPosicao = null;
            if (meuPerfil) {
                const { count } = await client
                    .from("perfis")
                    .select("id", { count: "exact" })
                    .gt("latinhas", meuPerfil.latinhas);
                minhaPosicao = (count || 0) + 1;
            }

            renderizarPodio(top, userId);
            renderizarTabela(top, userId, meuPerfil, minhaPosicao);
        }

        /* ── PÓDIO ── */
        function renderizarPodio(top, userId) {
            const podio = document.getElementById("podio");
            if (!podio || top.length === 0) return;

            // ordem visual: 2º | 1º | 3º
            const ordem   = [top[1], top[0], top[2]];
            const classes = ["second", "first", "third"];
            const icones  = ["🥈", "🥇", "🥉"];

            podio.innerHTML = ordem.map((u, i) => {
                if (!u) return "";
                const nome = u.id === userId ? "Você" : (u.nome || "Reciclador");
                return `
                    <div class="podium-card ${classes[i]}">
                        <div class="medal">${icones[i]}</div>
                        <h3>${nome}</h3>
                        <p>${(u.latinhas || 0).toLocaleString("pt-BR")} latinhas</p>
                    </div>
                `;
            }).join("");
        }

        /* ── TABELA ── */
        function renderizarTabela(top, userId, meuPerfil, minhaPosicao) {
            const container = document.getElementById("tabelaRanking");
            if (!container) return;

            const cabecalho = `
                <div class="ranking-header">
                    <span>Posição</span>
                    <span>Usuário</span>
                    <span>Latinhas ♻️</span>
                    <span>Pontos ⭐</span>
                </div>`;

            const linhas = top.map((u, i) => {
                const euSou = u.id === userId;
                return `
                    <div class="ranking-row ${euSou ? "current-user" : ""}">
                        <span class="posicao">#${i + 1}</span>
                        <span>${euSou ? "Você" : (u.nome || "Reciclador")}</span>
                        <span class="latinhas-col">${(u.latinhas || 0).toLocaleString("pt-BR")}</span>
                        <span class="pontos-col">${(u.pontos || 0).toLocaleString("pt-BR")}</span>
                    </div>`;
            });

            // Se o usuário não está no top 10, mostra ele separado
            const estaNoTop = top.some(u => u.id === userId);
            if (!estaNoTop && meuPerfil) {
                linhas.push(`
                    <div class="ranking-row current-user">
                        <span class="posicao">#${minhaPosicao ?? "-"}</span>
                        <span>Você</span>
                        <span class="latinhas-col">${(meuPerfil.latinhas || 0).toLocaleString("pt-BR")}</span>
                        <span class="pontos-col">${(meuPerfil.pontos || 0).toLocaleString("pt-BR")}</span>
                    </div>`);
            }

            container.innerHTML = cabecalho + linhas.join("");
        }

        carregarRanking();

        document.getElementById("logoutBtn")?.addEventListener("click", async () => {
            await client.auth.signOut();
            window.location.href = "login.html";
        });

    </script>

    <script src="assets/js/sidebar-toggle.js"></script>

</body>
</html>
