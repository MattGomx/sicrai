        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Minimizar menu">

        <nav>

            <a href="dashboard.html">
                <i class="fa-solid fa-chart-line"></i>
                <span class="link-text">Dashboard</span>
            </a>

            <a href="reciclagens.html">
                <i class="fa-solid fa-recycle"></i>
                <span class="link-text">Reciclagens</span>
            </a>

            <a href="recompensas-dashboard.html" class="active">
                <i class="fa-solid fa-gift"></i>
                <span class="link-text">Recompensas</span>
            </a>

            <a href="ranking.html">
                <i class="fa-solid fa-trophy"></i>

    <main class="main">

        <div class="topbar">

            <div>

                <h1>🎁 Loja de Recompensas</h1>

                <p>
                    Seus pontos disponíveis:
                    <strong id="pontosDisponiveis">0</strong>
                </p>

            </div>

        </div>

        <div class="store-grid">

    <div class="store-card">
        <i class="fa-solid fa-burger"></i>
        <h3>Vale Lanche</h3>
        <p>10 pontos</p>
        <button data-pontos="10" data-nome="Vale Lanche">Resgatar</button>
    </div>

    <div class="store-card">
        <i class="fa-solid fa-mug-hot"></i>
        <h3>Caneca</h3>
        <p>800 pontos</p>
        <button data-pontos="800" data-nome="Caneca">Resgatar</button>
    </div>

    <div class="store-card">
        <i class="fa-solid fa-shirt"></i>
        <h3>Camiseta</h3>
        <p>1200 pontos</p>
        <button data-pontos="1200" data-nome="Camiseta">Resgatar</button>
    </div>

    <div class="store-card">
        <i class="fa-solid fa-bottle-water"></i>
        <h3>Garrafa Térmica</h3>
        <p>1500 pontos</p>
        <button data-pontos="1500" data-nome="Garrafa Térmica">Resgatar</button>
    </div>

    <div class="store-card">
        <i class="fa-solid fa-leaf"></i>
        <h3>Kit Sustentável</h3>
        <p>2000 pontos</p>
        <button data-pontos="2000" data-nome="Kit Sustentável">Resgatar</button>
    </div>

    <div class="store-card">
        <i class="fa-solid fa-crown"></i>
        <h3>Prêmio Premium</h3>
        <p>5000 pontos</p>
        <button data-pontos="5000" data-nome="Prêmio Premium">Resgatar</button>
    </div>

</div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>

<script>

    let pontosAtuais = 0;

    async function carregarPontos() {
        const { data: { session } } = await client.auth.getSession();
        if (!session) {
            window.location.href = "login.html";
            return;
        }

        const { data: perfil } = await client
            .from("perfis")
            .select("pontos")
            .eq("id", session.user.id)
            .single();

        pontosAtuais = perfil?.pontos ?? 0;
        document.getElementById("pontosDisponiveis").textContent = pontosAtuais.toLocaleString("pt-BR");

        atualizarBotoes();
    }

    function atualizarBotoes() {
        document.querySelectorAll(".store-card button").forEach(botao => {
            const custo = parseInt(botao.dataset.pontos);
            botao.disabled = pontosAtuais < custo;
            botao.textContent = pontosAtuais < custo ? "Pontos insuficientes" : "Resgatar";
        });
    }

    document.querySelectorAll(".store-card button").forEach(botao => {

        botao.addEventListener("click", async () => {

            const custo = parseInt(botao.dataset.pontos);
            const nome = botao.dataset.nome;

            if (pontosAtuais < custo) return;

            const confirmar = confirm(`Resgatar "${nome}" por ${custo} pontos?`);
            if (!confirmar) return;

            botao.disabled = true;
            botao.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Resgatando...`;

            const { data: { session } } = await client.auth.getSession();

            const { data: perfil, error: erroGet } = await client
                .from("perfis")
                .select("pontos")
                .eq("id", session.user.id)
                .single();

            if (erroGet || !perfil || perfil.pontos < custo) {
                alert("Pontos insuficientes para resgatar esta recompensa.");
                await carregarPontos();
                return;
            }

            const novosPontos = perfil.pontos - custo;

            const { error } = await client
                .from("perfis")
                .update({ pontos: novosPontos })
                .eq("id", session.user.id);

            if (error) {
                alert("Erro ao resgatar recompensa. Tente novamente.");
                await carregarPontos();
                return;
            }

            alert(`🎉 "${nome}" resgatado com sucesso!`);
            await carregarPontos();

        });

    });

    carregarPontos();

    document.getElementById("logoutBtn")?.addEventListener("click", async () => {
        await client.auth.signOut();
        window.location.href = "login.html";
    });

</script>
<script src="assets/js/sidebar-toggle.js"></script>

    <script src="assets/js/sidebar-toggle.js"></script>

</body>
